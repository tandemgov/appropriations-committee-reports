<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Follow the Money — Appropriations</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12"></script>
<style>
  :root {
    --bg: #0f1420; --panel: #171d2b; --ink: #e8ecf3; --muted: #8b96a8;
    --line: #26304a; --accent: #4da3ff; --pos: #3fb27f; --neg: #e0645f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header { padding: 16px 22px 10px; border-bottom: 1px solid var(--line); }
  h1 { margin: 0 0 2px; font-size: 18px; letter-spacing: .2px; }
  header p { margin: 0; color: var(--muted); font-size: 12.5px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
    padding: 12px 22px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .ctl { display: flex; flex-direction: column; gap: 4px; }
  .ctl label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  select, input {
    background: #0d121c; color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; font-size: 13px; min-width: 150px;
  }
  .metrics { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
  .metrics button {
    background: #0d121c; color: var(--muted); border: 0; padding: 7px 12px;
    font-size: 12.5px; cursor: pointer; border-right: 1px solid var(--line);
  }
  .metrics button:last-child { border-right: 0; }
  .metrics button.on { background: var(--accent); color: #04101f; font-weight: 600; }
  .crumbs { padding: 8px 22px; color: var(--muted); font-size: 13px; min-height: 20px; }
  .crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .crumbs a:hover { text-decoration: underline; }
  #chart { padding: 6px 10px 30px; }
  .node rect { cursor: pointer; stroke: #0b0f18; stroke-width: .5px; }
  .node text { fill: var(--ink); font-size: 12px; paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }
  .link { fill: none; stroke-opacity: .38; transition: stroke-opacity .15s; }
  .link:hover { stroke-opacity: .62; }
  .hint { color: var(--muted); }
  #empty { padding: 40px 22px; color: var(--muted); }
  .tip {
    position: fixed; pointer-events: none; background: #05264a; color: #eaf3ff;
    border: 1px solid var(--accent); border-radius: 6px; padding: 6px 9px;
    font-size: 12.5px; opacity: 0; transition: opacity .1s; z-index: 20; max-width: 320px;
  }
</style>
</head>
<body>
<header>
  <h1>Follow the Money</h1>
  <p>Congressional appropriations line items — trace dollars from bill to account. Width = dollars. Click a node to drill in. Amounts are de-duplicated to account grain (base + mandatory where reported); treat as directional, not certified bill totals.</p>
</header>

<div class="controls">
  <div class="ctl"><label>Chamber</label><select id="f-chamber"></select></div>
  <div class="ctl"><label>Stage</label><select id="f-stage"></select></div>
  <div class="ctl"><label>Fiscal Year</label><select id="f-fy"></select></div>
  <div class="ctl"><label>Subcommittee</label><select id="f-sub"></select></div>
  <div class="ctl">
    <label>Metric</label>
    <div class="metrics" id="metrics">
      <button data-m="prior_year_enacted">Prior Yr</button>
      <button data-m="budget_estimate">Budget Est</button>
      <button data-m="committee_recommendation" class="on">Committee Rec</button>
    </div>
  </div>
  <div class="ctl"><label>Nodes / level</label><input id="f-top" type="number" min="3" max="40" value="12" style="min-width:80px" /></div>
</div>

<div class="crumbs" id="crumbs"></div>
<div id="empty" style="display:none"></div>
<div id="chart"></div>
<div class="tip" id="tip"></div>

<script>
const API = "";
const fmt = d3.format("$,.0f");
const fmtShort = (n) => {
  const a = Math.abs(n);
  const s = n < 0 ? "-" : "";
  if (a >= 1e9) return s + "$" + (a/1e9).toFixed(2) + "B";
  if (a >= 1e6) return s + "$" + (a/1e6).toFixed(1) + "M";
  if (a >= 1e3) return s + "$" + (a/1e3).toFixed(0) + "K";
  return s + "$" + a.toFixed(0);
};

// The default drilldown path of levels. Drilling appends the next level and
// pins the clicked value as a filter.
// Account is the finest grain that reconciles; the flow never drills below it.
const LEVEL_ORDER = ["subcommittee", "title_name", "department", "agency", "account"];
const LEVEL_LABEL = {
  subcommittee: "Subcommittee", title_name: "Title", department: "Department",
  agency: "Agency", account: "Account",
};

const state = {
  metric: "committee_recommendation",
  chamber: "", stage: "", fiscal_year: "", subcommittee: "", top: 12,
  // drill: array of {level, value} pinned filters beyond the base subcommittee filter
  drill: [],
};

const tip = document.getElementById("tip");
function showTip(html, e) {
  tip.innerHTML = html; tip.style.opacity = 1;
  tip.style.left = Math.min(e.clientX + 14, innerWidth - 340) + "px";
  tip.style.top = (e.clientY + 14) + "px";
}
function hideTip() { tip.style.opacity = 0; }

async function loadFacets() {
  const f = await (await fetch(API + "/api/facets")).json();
  fill("f-chamber", ["", ...f.chambers], "All chambers");
  fill("f-stage", ["", ...f.stages], "All stages");
  fill("f-fy", ["", ...f.fiscal_years], "All years");
  fill("f-sub", ["", ...f.subcommittees], "All subcommittees");
  // sensible default: latest year, house, committee stage
  const fy = document.getElementById("f-fy");
  if (f.fiscal_years.length) { fy.value = f.fiscal_years[f.fiscal_years.length - 1]; state.fiscal_year = fy.value; }
}
function fill(id, values, allLabel) {
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  for (const v of values) {
    const o = document.createElement("option");
    o.value = v; o.textContent = v === "" ? allLabel : v;
    sel.appendChild(o);
  }
}

// Compute the levels + pinned filters for the current drill state.
function currentLevels() {
  // Base: the two innermost visible levels start at subcommittee (or the drill tail).
  let baseIdx = 0;
  const pinned = {};
  let subFilter = state.subcommittee;
  for (const d of state.drill) {
    pinned[d.level] = d.value;
    if (d.level === "subcommittee") subFilter = d.value;
    baseIdx = Math.max(baseIdx, LEVEL_ORDER.indexOf(d.level) + 1);
  }
  // Show three levels starting at baseIdx (clamped).
  const levels = LEVEL_ORDER.slice(baseIdx, baseIdx + 3);
  if (levels.length < 2) {
    // At the deepest end — show the last two levels.
    return { levels: LEVEL_ORDER.slice(-2), pinned, subFilter };
  }
  return { levels, pinned, subFilter };
}

async function render() {
  const { levels, pinned, subFilter } = currentLevels();
  const params = new URLSearchParams();
  params.set("metric", state.metric);
  params.set("levels", levels.join(","));
  params.set("top", state.top);
  if (state.chamber) params.set("chamber", state.chamber);
  if (state.stage) params.set("stage", state.stage);
  if (state.fiscal_year) params.set("fiscal_year", state.fiscal_year);
  if (subFilter) params.set("subcommittee", subFilter);

  const data = await (await fetch(API + "/api/flow?" + params)).json();
  drawCrumbs(data.coverage);

  const chart = document.getElementById("chart");
  const empty = document.getElementById("empty");
  chart.innerHTML = "";
  if (!data.links.length) {
    empty.style.display = "block";
    empty.textContent = "No line items with a " + metricLabel(state.metric) + " value for this selection. Try another metric or clear filters.";
    return;
  }
  empty.style.display = "none";
  drawSankey(data, data.levels);  // server may prune sparse levels
}

function metricLabel(m) {
  return { prior_year_enacted: "prior-year enacted", budget_estimate: "budget estimate",
           committee_recommendation: "committee recommendation" }[m];
}

function drawCrumbs(coverage) {
  const c = document.getElementById("crumbs");
  const parts = ['<a data-i="-1">All</a>'];
  state.drill.forEach((d, i) => {
    parts.push('<span class="hint"> › </span><a data-i="' + i + '">' + d.value + '</a>');
  });
  let cov = "";
  if (coverage) {
    const extra = [];
    if (coverage.recovered_attributable_rows)
      extra.push(`${coverage.recovered_attributable_rows} rows attributable by structure (amounts don't reconcile — not summed)`);
    if (coverage.unlabeled_rows)
      extra.push(`${coverage.unlabeled_rows} unlabeled`);
    cov = `<span class="hint"> — ${fmtShort(coverage.total_flowed)} across ${coverage.accounts} named accounts`
        + (extra.length ? `; ${extra.join("; ")}` : "")
        + `</span>`;
  }
  c.innerHTML = "Drilldown: " + parts.join("") + cov;
  c.querySelectorAll("a").forEach(a => a.onclick = () => {
    const i = +a.dataset.i;
    state.drill = i < 0 ? [] : state.drill.slice(0, i + 1);
    render();
  });
}

function drawSankey(data, levels) {
  const width = Math.max(900, document.getElementById("chart").clientWidth - 20);
  const rowH = 26;
  const maxNodesInLevel = d3.max(d3.rollups(data.nodes, v => v.length, d => d.level), d => d[1]) || 1;
  const height = Math.max(420, maxNodesInLevel * rowH + 40);

  const svg = d3.select("#chart").append("svg")
    .attr("width", width).attr("height", height)
    .attr("viewBox", [0, 0, width, height]);

  const sankey = d3.sankey()
    .nodeId(d => d.id)
    .nodeWidth(14)
    .nodePadding(11)
    .nodeSort(null)
    .extent([[6, 10], [width - 6, height - 10]]);

  // d3-sankey mutates; give it copies.
  const graph = sankey({
    nodes: data.nodes.map(d => ({ ...d })),
    links: data.links.map(d => ({ ...d })),
  });

  const color = d3.scaleOrdinal(d3.schemeTableau10);
  const nodeColor = d => color(d.level + ":" + (d.name || ""));

  svg.append("g").selectAll("path")
    .data(graph.links).join("path")
    .attr("class", "link")
    .attr("d", d3.sankeyLinkHorizontal())
    .attr("stroke", d => nodeColor(d.source))
    .attr("stroke-width", d => Math.max(1, d.width))
    .on("mousemove", (e, d) => showTip(
      `<b>${d.source.name}</b> → <b>${d.target.name}</b><br>${fmt(d.value)}`, e))
    .on("mouseleave", hideTip);

  const node = svg.append("g").selectAll("g")
    .data(graph.nodes).join("g").attr("class", "node");

  node.append("rect")
    .attr("x", d => d.x0).attr("y", d => d.y0)
    .attr("width", d => d.x1 - d.x0)
    .attr("height", d => Math.max(1, d.y1 - d.y0))
    .attr("fill", nodeColor)
    .on("mousemove", (e, d) => showTip(
      `<b>${d.name}</b><br>${LEVEL_LABEL[levels[d.level]] || levels[d.level]} · ${fmt(d.total)}`
      + (drillable(d, levels) ? "<br><span style='opacity:.8'>click to drill in ↴</span>" : ""), e))
    .on("mouseleave", hideTip)
    .on("click", (e, d) => onNodeClick(d, levels));

  node.append("text")
    .attr("x", d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
    .attr("y", d => (d.y1 + d.y0) / 2)
    .attr("dy", "0.35em")
    .attr("text-anchor", d => d.x0 < width / 2 ? "start" : "end")
    .text(d => `${truncate(d.name, 34)}  ${fmtShort(d.total)}`);
}

function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 1) + "…" : s; }

function drillable(node, levels) {
  const lv = levels[node.level];
  if (node.name === "(other)" || node.name === "(unspecified)") return false;
  return LEVEL_ORDER.indexOf(lv) < LEVEL_ORDER.length - 1;
}

function onNodeClick(node, levels) {
  if (!drillable(node, levels)) return;
  const lv = levels[node.level];
  // Replace any existing pin at this level, then append.
  state.drill = state.drill.filter(d => LEVEL_ORDER.indexOf(d.level) < LEVEL_ORDER.indexOf(lv));
  state.drill.push({ level: lv, value: node.name });
  hideTip();
  render();
}

// --- wire controls ---
function bind(id, key) {
  document.getElementById(id).addEventListener("change", (e) => {
    state[key] = e.target.value;
    if (key === "subcommittee") state.drill = []; // reset drill when base filter changes
    render();
  });
}
bind("f-chamber", "chamber");
bind("f-stage", "stage");
bind("f-fy", "fiscal_year");
bind("f-sub", "subcommittee");
document.getElementById("f-top").addEventListener("change", (e) => {
  state.top = Math.max(3, Math.min(40, +e.target.value || 12)); render();
});
document.querySelectorAll("#metrics button").forEach(b => b.onclick = () => {
  document.querySelectorAll("#metrics button").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); state.metric = b.dataset.m; render();
});
window.addEventListener("resize", () => { clearTimeout(window._rt); window._rt = setTimeout(render, 200); });

(async function init() {
  await loadFacets();
  await render();
})();
</script>
</body>
</html>
